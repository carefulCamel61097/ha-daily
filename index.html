<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ha-Daily</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0B1221" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="pwa-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="app">
      <div class="topbar">
        <button
          id="settingsBtn"
          class="icon-btn"
          aria-label="Display settings"
          aria-expanded="false"
          aria-controls="settingsPanel"
        >
          ⚙
        </button>
      </div>
      <div id="settingsPanel" class="settings-panel" hidden>
        <button id="toggleThai" class="toggle" type="button" aria-pressed="true">
          Thai
        </button>
        <button id="toggleEn" class="toggle" type="button" aria-pressed="true">
          English
        </button>
        <button id="toggleScript" class="toggle" type="button" aria-pressed="false">
          Romanized
        </button>
        <button id="toggleExample" class="toggle" type="button" aria-pressed="true">
          Examples
        </button>
        <button id="resetBtn" class="reset-btn" type="button">
          Start over from Day 1
        </button>
      </div>

      <div class="pagination">
        <button class="nav-btn" id="prevBtn">‹</button>
        <div class="page-indicator">
          <input type="number" id="pageInput" min="1" value="1" />
          <span id="totalPages">/ 240</span>
        </div>
        <button class="nav-btn" id="nextBtn">›</button>
      </div>

      <div id="wordList" class="word-list"></div>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
